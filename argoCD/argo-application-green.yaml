apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techwave-web-green
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/luismuma/techwave_web_K8s.git
    targetRevision: releases/2.0.1
    path: helm/flask-app
    helm:
      valueFiles:
        - values-green.yaml
      releaseName: flask-app-green
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
